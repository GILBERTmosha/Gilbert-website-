            font-size: 18px;

            width: 280px;
            font-weight: 600;
        }

        a.button-link:hover {
            background: #ff4500;
            color: white;
            transform: translateY(-5px);
            border-color: transparent;
            box-shadow: 0 15px 25px rgba(255, 69, 0, 0.4);
        }

        .contact-card {
            background: #f5f5f5;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            border-left: 10px solid #00fa9a;
        }

        .contact-card h2 {
            margin-top: 0;
            color: #483d8b;
            font-size: 24px;
            border-bottom: 2px solid #d3d3d3;
            padding-bottom: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            font-size: 16px;
        }

        .contact-item strong {
            width: 100px;
            color: #708090;
        }

        .comment-box {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .comment-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, #00fa9a, #ff4500, #ffd700);
        }

        .comment-box input, .comment-box textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #f5f5f5;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            background: #f8f8ff;
        }

        .whatsapp-warning {
            font-size: 11px;
            color: #dc143c;
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .submit-btn {
            background: linear-gradient(to right, #ff1493, #9400d3);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        .submit-btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.8;
